<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 背景 -->
  <rect width="512" height="512" rx="100" fill="#4CAF50"/>

  <!-- 记账本 -->
  <g transform="translate(256,220)">
    <!-- 书本 -->
    <rect x="-120" y="-100" width="240" height="280" rx="16" fill="#fff" stroke="#388E3C" stroke-width="6"/>
    <!-- 书脊 -->
    <line x1="0" y1="-100" x2="0" y2="180" stroke="#E0E0E0" stroke-width="4"/>
    <!-- 左侧线条 -->
    <line x1="-90" y1="-50" x2="-30" y2="-50" stroke="#C8E6C9" stroke-width="6" stroke-linecap="round"/>
    <line x1="-90" y1="-10" x2="-30" y2="-10" stroke="#C8E6C9" stroke-width="6" stroke-linecap="round"/>
    <line x1="-90" y1="30" x2="-30" y2="30" stroke="#C8E6C9" stroke-width="6" stroke-linecap="round"/>
    <line x1="-90" y1="70" x2="-30" y2="70" stroke="#C8E6C9" stroke-width="6" stroke-linecap="round"/>
    <!-- 右侧 ¥ 符号 -->
    <text x="120" y="130" font-family="Arial" font-size="72" font-weight="bold" fill="#4CAF50" text-anchor="end">¥</text>
    <!-- 右侧金额数字 -->
    <text x="120" y="175" font-family="Arial" font-size="28" font-weight="bold" fill="#388E3C" text-anchor="end">+100.00</text>
    <text x="120" y="205" font-family="Arial" font-size="28" font-weight="bold" fill="#F44336" text-anchor="end">-35.50</text>
  </g>
</svg>
