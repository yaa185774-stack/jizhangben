name: 生成 APK 安装包

on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [master]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: 生成签名密钥
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias jizhangben \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android123 -keypass android123 \
            -dname "CN=JizhangBen, OU=App, O=JZB, L=Shenzhen, ST=Guangdong, C=CN"

      - name: 初始化 TWA 项目
        run: |
          mkdir -p twa-project
          cd twa-project
          bubblewrap init --manifest https://yaa185774-stack.github.io/jizhangben/manifest.json

      - name: 更新 TWA 配置
        run: |
          cd twa-project
          # 设置 keystore 信息
          cat > keystore.json << 'EOF'
          {
            "keystorePath": "../release.keystore",
            "keystorePassword": "android123",
            "keyAlias": "jizhangben",
            "keyPassword": "android123"
          }
          EOF
          # 换成 .jks 扩展名
          cp ../release.keystore ./app-release.keystore 2>/dev/null || true

      - name: 构建 APK
        run: |
          cd twa-project
          bubblewrap build

      - name: 查找并上传 APK
        run: |
          echo "查找生成的 APK 文件..."
          find twa-project -name "*.apk" -type f 2>/dev/null || find . -name "*.apk" -type f 2>/dev/null
          mkdir -p output
          APK=$(find twa-project -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            APK=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          fi
          if [ -n "$APK" ]; then
            cp "$APK" output/记账本.apk
            echo "APK found: $APK"
          else
            echo "No APK found, listing all files:"
            find . -name "*.apk" -o -name "*.aab" 2>/dev/null || echo "No APK/AAB files"
            exit 1
          fi

      - name: 上传 APK 构件
        uses: actions/upload-artifact@v4
        with:
          name: 记账本-APK
          path: output/记账本.apk

      - name: 发布到 Release（仅版本标签推送时）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: output/记账本.apk
          body: |
            # 📱 记账本 安卓安装包

            直接下载 APK 安装到手机即可使用！

            - 🔒 数据存储在手机本地
            - 📶 无需联网
            - 🎯 绿色安全无毒
