name: 生成 APK 安装包

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: 生成签名密钥
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias jizhangben \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android123 -keypass android123 \
            -dname "CN=JizhangBen, OU=App, O=JZB, L=Shenzhen, ST=Guangdong, C=CN"

      - name: 初始化 TWA 项目
        run: |
          # 非交互式初始化（自动回答 No 跳过 JDK 安装）
          printf "n\n" | bubblewrap init --manifest https://yaa185774-stack.github.io/jizhangben/manifest.json

      - name: 配置签名密钥
        run: |
          # 用 jq 把签名信息写入 twa-manifest.json
          cat twa-manifest.json | jq '. + {
            "packageId": (.packageId // "com.jizhangben.app"),
            "signingKey": {
              "path": "./release.keystore",
              "alias": "jizhangben"
            },
            "signingKeyPassword": "android123",
            "signingKeyAliasPassword": "android123"
          }' > tmp.json && mv tmp.json twa-manifest.json

          # 拷贝 keystore 到项目目录
          cp release.keystore ./

          cat twa-manifest.json

      - name: 构建 APK
        run: |
          printf "n\n" | bubblewrap build

      - name: 收集 APK
        run: |
          mkdir -p output
          APK=$(find . -name "*.apk" 2>/dev/null | grep -i release | head -1)
          if [ -z "$APK" ]; then
            APK=$(find . -name "*.apk" 2>/dev/null | head -1)
          fi
          if [ -n "$APK" ]; then
            cp "$APK" output/jizhangben.apk
            echo "✅ APK: $(du -h output/jizhangben.apk | cut -f1)"
          else
            echo "⚠️ 未找到 APK"
            find . -name "*.apk" -o -name "*.aab" 2>/dev/null
            exit 1
          fi

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 记账本-安装包
          path: output/jizhangben.apk
