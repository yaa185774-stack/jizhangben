name: 生成 APK 安装包

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'android-app/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q gradle-8.4-bin.zip
          echo "$PWD/gradle-8.4/bin" >> $GITHUB_PATH

      - name: 生成签名密钥
        working-directory: android-app
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias jizhangben \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android123 -keypass android123 \
            -dname "CN=JizhangBen, OU=App, O=JZB, L=Shenzhen, ST=Guangdong, C=CN"

      - name: 构建 APK
        working-directory: android-app
        run: gradle assembleRelease --no-daemon

      - name: 查找 APK
        run: |
          APK=$(find android-app -name "*.apk" | grep -i release | head -1)
          mkdir -p output
          cp "$APK" output/jizhangben.apk
          echo "✅ APK 大小: $(du -h output/jizhangben.apk | cut -f1)"

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 记账本-安装包
          path: output/jizhangben.apk
