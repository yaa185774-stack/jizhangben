name: 生成 APK 安装包

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'android-app/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 生成 Gradle Wrapper
        working-directory: android-app
        run: |
          # 安装 Gradle 8.4（与 AGP 8.2 兼容）
          sudo apt-get update -qq && sudo apt-get install -y -qq gradle
          gradle --version
          gradle wrapper --gradle-version 8.4

      - name: 生成签名密钥
        working-directory: android-app
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias jizhangben \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android123 -keypass android123 \
            -dname "CN=JizhangBen, OU=App, O=JZB, L=Shenzhen, ST=Guangdong, C=CN"

      - name: 构建 APK
        working-directory: android-app
        run: ./gradlew assembleRelease --no-daemon

      - name: 查找 APK
        run: |
          APK=$(find android-app -name "*.apk" | grep -i release | head -1)
          if [ -z "$APK" ]; then
            APK=$(find android-app -name "*.apk" | head -1)
          fi
          echo "APK: $APK"
          mkdir -p output
          cp "$APK" output/jizhangben.apk
          echo "✅ 大小: $(du -h output/jizhangben.apk | cut -f1)"

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 记账本-安装包
          path: output/jizhangben.apk
